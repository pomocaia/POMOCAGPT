<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>PomocaGPT · Guía interna de IA</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
:root{
  --bg:oklch(0.98 0.01 85);--surface:oklch(1 0 0);--surface-2:oklch(0.955 0.015 80);
  --ink:oklch(0.16 0.02 250);--ink-soft:oklch(0.42 0.02 250);--ink-mute:oklch(0.58 0.02 250);
  --border:oklch(0.88 0.015 80);--border-soft:oklch(0.93 0.012 80);
  --brand:oklch(0.52 0.2 262);--brand-2:oklch(0.68 0.18 45);--brand-3:oklch(0.65 0.15 180);
  --brand-ink:oklch(0.25 0.15 262);--brand-soft:oklch(0.94 0.04 262);
  --warn:oklch(0.62 0.18 30);--success:oklch(0.58 0.15 150);--ink-dark:oklch(0.14 0.02 262);
}
.app{min-height:100vh}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:color-mix(in oklab,var(--bg) 92%,transparent);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer}
.brand-mono{width:40px;height:40px;background:linear-gradient(135deg,var(--brand) 0%,oklch(0.35 0.2 280) 100%);color:white;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:24px;border-radius:10px;box-shadow:0 4px 12px oklch(0.52 0.2 262/0.25)}
.brand-name{font-family:'Instrument Serif',serif;font-size:22px;line-height:1;letter-spacing:-0.01em}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-mute);margin-top:3px;letter-spacing:0.1em;text-transform:uppercase}
.nav{display:flex;gap:2px;background:var(--surface-2);padding:4px;border-radius:10px}
.nav button{background:transparent;border:none;padding:8px 14px;font:inherit;font-size:13px;color:var(--ink-soft);cursor:pointer;border-radius:7px;transition:all 150ms}
.nav button:hover{color:var(--ink);background:var(--surface)}
.nav button.active{background:var(--ink);color:var(--bg);font-weight:500;box-shadow:0 2px 8px oklch(0 0 0/0.1)}
.topbar-right{display:flex;align-items:center;gap:14px}
.status-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;background:color-mix(in oklab,var(--success) 18%,transparent);color:oklch(0.38 0.14 150);border-radius:999px;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px color-mix(in oklab,var(--success) 25%,transparent);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:0.4}}
/* HERO */
.hero-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--border);background:radial-gradient(60% 80% at 85% 10%,oklch(0.72 0.16 45/0.15),transparent 60%),radial-gradient(50% 60% at 10% 90%,oklch(0.6 0.2 262/0.14),transparent 60%),var(--bg)}
.hero-wrap::before{content:'';position:absolute;inset:0;background-image:linear-gradient(to right,oklch(0 0 0/0.035) 1px,transparent 1px),linear-gradient(to bottom,oklch(0 0 0/0.035) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 80%);pointer-events:none}
.hero{max-width:1200px;margin:0 auto;padding:80px 40px 72px;position:relative}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brand-ink);letter-spacing:0.06em;text-transform:uppercase}
.hero-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--brand)}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-mute);letter-spacing:0.06em}
.hero-title{font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(52px,8vw,116px);line-height:0.95;letter-spacing:-0.035em;margin:0 0 24px;color:var(--ink);max-width:14ch}
.hero-title em{font-style:italic;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{font-size:20px;line-height:1.5;color:var(--ink-soft);max-width:54ch;margin:0 0 40px;text-wrap:pretty}
.hero-ctas{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:60px}
.btn-primary{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;background:var(--ink);color:var(--bg);border:none;border-radius:10px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:transform 150ms,background 150ms;box-shadow:0 4px 14px oklch(0 0 0/0.15)}
.btn-primary:hover{transform:translateY(-1px);background:var(--brand-ink)}
.btn-primary .arr{transition:transform 180ms}
.btn-primary:hover .arr{transform:translateX(3px)}
.btn-secondary{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:10px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all 150ms}
.btn-secondary:hover{border-color:var(--ink);background:var(--bg)}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 10px 40px oklch(0 0 0/0.06)}
.hero-stat{padding:22px 24px;border-right:1px solid var(--border)}
.hero-stat:last-child{border-right:none}
.hero-stat-k{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.hero-stat-v{font-family:'Instrument Serif',serif;font-size:32px;line-height:1;letter-spacing:-0.01em}
.hero-stat-v em{font-style:italic;color:var(--brand)}
/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:0 40px 100px}
.section{padding:80px 0;border-top:1px solid var(--border)}
.section:first-child{border-top:none}
.section-head{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;margin-bottom:44px;align-items:end}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--brand);margin-bottom:14px;font-weight:500}
.eyebrow-num{padding:2px 8px;background:var(--brand-soft);border-radius:4px;color:var(--brand-ink)}
.h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(32px,4vw,48px);line-height:1.05;letter-spacing:-0.02em;margin:0}
.h2 em{font-style:italic;color:var(--brand)}
.section-intro{color:var(--ink-soft);font-size:16px;line-height:1.55;max-width:50ch;text-wrap:pretty;margin:0}
/* PRIVACY */
.privacy{position:relative;padding:36px 40px;background:linear-gradient(135deg,var(--ink-dark) 0%,oklch(0.18 0.06 280) 100%);color:var(--bg);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center;box-shadow:0 20px 50px oklch(0 0 0/0.18)}
.privacy::after{content:'';position:absolute;right:-80px;top:-80px;width:280px;height:280px;background:radial-gradient(circle,var(--brand-2) 0%,transparent 70%);opacity:0.3;pointer-events:none}
.privacy-icon{width:52px;height:52px;background:oklch(1 0 0/0.12);border:1.5px solid oklch(1 0 0/0.25);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:28px;color:var(--brand-2);flex-shrink:0}
.privacy-content{position:relative;z-index:1}
.privacy-title{font-family:'Instrument Serif',serif;font-size:28px;margin:0 0 8px;font-style:italic;letter-spacing:-0.01em}
.privacy-body{font-size:15px;line-height:1.55;color:oklch(0.88 0.02 250);max-width:64ch}
.privacy-body strong{color:var(--brand-2);font-weight:500}
.privacy-tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:8px 14px;background:oklch(1 0 0/0.1);border:1px solid oklch(1 0 0/0.2);border-radius:999px;color:var(--bg);text-transform:uppercase;letter-spacing:0.14em;white-space:nowrap;position:relative;z-index:1}
/* TOOLS */
.tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tool-card{padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;gap:12px;transition:all 180ms;position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-color,var(--brand));transform:translateY(-3px);transition:transform 180ms}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 12px 30px oklch(0 0 0/0.08)}
.tool-card:hover::before{transform:translateY(0)}
.tool-glyph{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft,var(--brand-soft));color:var(--accent-ink,var(--brand-ink));font-size:20px;font-family:'Instrument Serif',serif}
.tool-tool{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.tool-tarea{font-size:13.5px;color:var(--ink-soft);line-height:1.45;flex:1}
.tool-uso{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.08em;padding-top:10px;border-top:1px dashed var(--border)}
/* FREE TOOLS */
.free-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.free-card{padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;gap:10px;transition:all 180ms}
.free-card:hover{transform:translateY(-2px);box-shadow:0 12px 30px oklch(0 0 0/0.08);border-color:var(--ink)}
.free-card-name{font-size:16px;font-weight:600;color:var(--ink)}
.free-card-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;background:color-mix(in oklab,var(--brand) 10%,transparent);color:var(--brand-ink);border-radius:6px;letter-spacing:0.04em;align-self:flex-start}
.free-card-desc{font-size:13px;color:var(--ink-soft);line-height:1.45;flex:1}
.free-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--brand-ink);text-decoration:none;padding:7px 12px;border:1px solid var(--border);border-radius:7px;transition:all 150ms;width:fit-content}
.free-link:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
/* STEPS */
.steps-wide{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;position:relative}
.step-col{padding:28px 24px 30px;background:var(--surface);border:1px solid var(--border);border-radius:16px;position:relative;transition:all 180ms}
.step-col:hover{border-color:var(--brand);box-shadow:0 10px 30px oklch(0.52 0.2 262/0.1)}
.step-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.step-num{width:36px;height:36px;border-radius:10px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.step-t{font-family:'Instrument Serif',serif;font-size:30px;line-height:1;letter-spacing:-0.02em;font-style:italic;color:var(--brand)}
.step-d{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:18px}
.step-ex-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.step-ex{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.55;color:var(--ink);padding:14px 16px;background:var(--surface-2);border-radius:10px;border-left:3px solid var(--brand)}
/* PROMPTS */
.prompts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.prompt-card{padding:26px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;transition:all 180ms}
.prompt-card:hover{border-color:var(--ink);box-shadow:0 10px 30px oklch(0 0 0/0.07)}
.prompt-card-head{display:flex;justify-content:space-between;align-items:start;gap:14px;margin-bottom:16px}
.prompt-title{font-family:'Instrument Serif',serif;font-size:24px;line-height:1.1;letter-spacing:-0.01em;margin:0;flex:1}
.prompt-code{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 9px;background:var(--surface-2);color:var(--ink-mute);border-radius:6px;letter-spacing:0.06em}
.prompt-body{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;padding:16px;background:var(--ink-dark);color:oklch(0.85 0.02 250);border-radius:10px;white-space:pre-wrap;flex:1;margin-bottom:16px;max-height:180px;overflow:hidden;position:relative}
.prompt-body::after{content:'';position:absolute;left:0;right:0;bottom:0;height:50px;background:linear-gradient(transparent,var(--ink-dark));pointer-events:none}
.prompt-actions{display:flex;gap:8px}
.btn-copy{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--bg);border:none;padding:10px 16px;border-radius:8px;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all 150ms}
.btn-copy:hover{background:var(--brand)}
.btn-copy.copied{background:var(--success)}
/* DEPARTMENTS */
.deps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dep-card{padding:26px;background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:all 180ms;display:flex;flex-direction:column;min-height:260px;position:relative;overflow:hidden;cursor:pointer}
.dep-card:hover{transform:translateY(-2px);box-shadow:0 14px 40px oklch(0 0 0/0.08)}
.dep-card::after{content:'';position:absolute;width:140px;height:140px;top:-40px;right:-40px;border-radius:50%;background:var(--dep-color);opacity:0.08;transition:transform 400ms}
.dep-card:hover::after{transform:scale(1.3)}
.dep-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;position:relative}
.dep-glyph{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--dep-color);color:white;font-size:20px}
.dep-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-mute)}
.dep-title{font-family:'Instrument Serif',serif;font-size:24px;line-height:1.1;letter-spacing:-0.01em;margin-bottom:14px}
.dep-list{list-style:none;margin:0;padding:0;flex:1}
.dep-list li{padding:10px 0;border-top:1px dashed var(--border);font-size:13.5px}
.dep-list li:first-child{border-top:none}
.dep-l-t{color:var(--ink);font-weight:500;display:block;margin-bottom:2px}
.dep-l-d{color:var(--ink-mute);font-size:12px}
.dep-open{margin-top:auto;padding-top:14px;font-size:12.5px;font-weight:500;color:var(--brand-ink);display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
/* IT TEASER */
.it-teaser{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;padding:56px;background:linear-gradient(135deg,var(--ink-dark) 0%,oklch(0.2 0.1 262) 60%,oklch(0.3 0.15 280) 100%);color:var(--bg);border-radius:24px;align-items:center;position:relative;overflow:hidden;box-shadow:0 30px 80px oklch(0.2 0.1 262/0.25)}
.it-teaser::before{content:'';position:absolute;top:0;right:0;bottom:0;width:50%;background:radial-gradient(circle at 70% 50%,oklch(0.7 0.2 45/0.2),transparent 50%),radial-gradient(circle at 30% 80%,oklch(0.55 0.2 300/0.3),transparent 60%);pointer-events:none}
.it-teaser-label{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:oklch(1 0 0/0.08);border:1px solid oklch(1 0 0/0.15);border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brand-2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:22px}
.it-teaser-title{font-family:'Instrument Serif',serif;font-size:clamp(40px,5vw,62px);line-height:0.98;letter-spacing:-0.025em;margin:0 0 20px}
.it-teaser-title em{font-style:italic;background:linear-gradient(135deg,var(--brand-2),oklch(0.82 0.12 70));-webkit-background-clip:text;background-clip:text;color:transparent}
.it-teaser-body{font-size:16px;line-height:1.55;color:oklch(0.88 0.02 250);max-width:44ch;margin-bottom:30px}
.btn-glow{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;background:var(--bg);color:var(--ink);border:none;border-radius:10px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all 180ms;box-shadow:0 0 0 4px oklch(1 0 0/0.1)}
.btn-glow:hover{transform:translateY(-1px);box-shadow:0 0 0 6px oklch(1 0 0/0.15),0 10px 30px oklch(0 0 0/0.2)}
.it-teaser-side{display:flex;flex-direction:column;gap:8px;position:relative}
.it-mod-chip{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:oklch(1 0 0/0.05);border:1px solid oklch(1 0 0/0.1);border-radius:10px;font-size:14px;color:var(--bg);backdrop-filter:blur(8px);transition:all 180ms}
.it-mod-chip:hover{background:oklch(1 0 0/0.1);transform:translateX(4px)}
.it-mod-chip-left{display:flex;align-items:center;gap:12px}
.it-mod-chip-n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--brand-2);background:oklch(0.65 0.15 45/0.15);padding:3px 7px;border-radius:5px}
.it-mod-chip-c{color:oklch(0.75 0.02 250);font-size:12px;font-family:'JetBrains Mono',monospace}
/* FOOTER */
.footer{padding:40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-mute);letter-spacing:0.06em;flex-wrap:wrap;gap:16px}
.footer strong{color:var(--ink);font-weight:500}
/* AREA PAGE */
.area-page{max-width:1200px;margin:0 auto;padding:40px 40px 100px}
.area-back{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:13px;color:var(--ink-soft);cursor:pointer;font:inherit;transition:all 150ms;margin-bottom:40px}
.area-back:hover{border-color:var(--ink);color:var(--ink)}
.area-header{margin-bottom:50px}
.area-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--brand);margin-bottom:12px;display:block}
.area-title-big{font-family:'Instrument Serif',serif;font-size:clamp(44px,6vw,72px);line-height:0.98;letter-spacing:-0.03em;margin:0 0 14px}
.area-desc-text{font-size:17px;color:var(--ink-soft);line-height:1.55;max-width:50ch}
.area-prompts{display:flex;flex-direction:column;gap:16px}
.ap-card{padding:30px;background:var(--surface);border:1px solid var(--border);border-radius:18px;transition:all 180ms}
.ap-card:hover{box-shadow:0 12px 40px oklch(0 0 0/0.08)}
.ap-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:18px}
.ap-meta{}
.ap-num{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.ap-title{font-family:'Instrument Serif',serif;font-size:28px;line-height:1.05;letter-spacing:-0.02em;margin-bottom:6px}
.ap-desc{font-size:14px;color:var(--ink-soft);line-height:1.5}
.ap-box{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;padding:20px;background:var(--ink-dark);color:oklch(0.85 0.02 250);border-radius:12px;white-space:pre-wrap;margin-bottom:14px}
/* INFOTOOLS PAGE */
.it-page-hero{border-bottom:1px solid var(--border);background:radial-gradient(60% 70% at 20% 20%,oklch(0.7 0.15 180/0.1),transparent 60%),radial-gradient(50% 60% at 85% 80%,oklch(0.65 0.18 45/0.12),transparent 60%),var(--bg)}
.it-page-hero-inner{max-width:1200px;margin:0 auto;padding:60px 40px}
.it-modules{max-width:1200px;margin:0 auto;padding:60px 40px 80px}
.it-mod-section{padding:48px 0;border-top:1px solid var(--border)}
.it-mod-section:last-child{border-bottom:1px solid var(--border)}
.it-mod-head{display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:start;margin-bottom:28px}
.it-mod-tag{display:flex;flex-direction:column;align-items:center;padding:14px 16px;background:var(--mod-color);color:white;border-radius:14px;min-width:88px;box-shadow:0 6px 18px var(--mod-shadow,oklch(0 0 0/0.15))}
.it-mod-tag-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.8}
.it-mod-tag-num{font-family:'Instrument Serif',serif;font-size:34px;font-style:italic;line-height:1;margin-top:2px}
.it-mod-title{font-family:'Instrument Serif',serif;font-size:clamp(30px,3.2vw,40px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 10px}
.it-mod-desc{color:var(--ink-soft);font-size:15.5px;line-height:1.5;max-width:60ch;margin:0}
.it-mod-meta{text-align:right;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;white-space:nowrap}
.it-mod-meta-v{font-family:'Instrument Serif',serif;font-size:22px;line-height:1}
.it-mod-meta-v span{color:var(--ink-mute);font-size:14px}
.it-mod-meta-k{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.it-lessons{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.it-lesson{display:grid;grid-template-columns:1fr auto;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;align-items:center;cursor:pointer;transition:all 160ms}
.it-lesson:hover{border-color:var(--mod-color);transform:translateY(-1px);box-shadow:0 8px 20px oklch(0 0 0/0.06)}
.it-lesson-title{font-size:14px;line-height:1.35;color:var(--ink);font-weight:500}
.it-lesson-code{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-mute);margin-right:8px}
.it-lesson-right{display:flex;align-items:center;gap:10px}
.it-lesson-dur{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-mute)}
.it-lesson-play{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface-2);border:none;border-radius:50%;color:var(--ink);cursor:pointer;transition:all 150ms;flex-shrink:0}
.it-lesson:hover .it-lesson-play{background:var(--mod-color);color:white}
/* MODAL */
.modal-scrim{position:fixed;inset:0;background:oklch(0.1 0.015 250/0.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:40px;backdrop-filter:blur(8px);animation:fadeIn 180ms}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg);border-radius:18px;max-width:1000px;width:100%;overflow:hidden;animation:popIn 220ms cubic-bezier(.2,.8,.3,1);box-shadow:0 40px 80px oklch(0 0 0/0.3)}
@keyframes popIn{from{transform:translateY(16px) scale(0.97);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Instrument Serif',serif;font-size:24px;margin:0;letter-spacing:-0.01em}
.modal-close{background:var(--surface-2);border:none;font-size:18px;cursor:pointer;color:var(--ink-soft);width:34px;height:34px;border-radius:10px}
.modal-close:hover{background:var(--ink);color:var(--bg)}
.modal-video{aspect-ratio:16/9;width:100%;background:black}
.modal-video iframe{width:100%;height:100%;border:0;display:block}
/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 20px;background:var(--ink-dark);color:var(--bg);border-radius:999px;font-size:13px;z-index:50;animation:toastAnim 1.8s ease forwards;font-family:'Geist',sans-serif;box-shadow:0 10px 30px oklch(0 0 0/0.25);display:inline-flex;align-items:center;gap:8px}
.toast::before{content:'✓';color:var(--success)}
@keyframes toastAnim{0%{opacity:0;transform:translate(-50%,10px)}15%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-6px)}}
/* RESPONSIVE */
@media(max-width:980px){
  .topbar{padding:12px 20px;flex-wrap:wrap;gap:10px}.topbar-right{display:none}
  .hero{padding:50px 20px 40px}.hero-stats{grid-template-columns:repeat(2,1fr)}
  .page{padding:0 20px 60px}.section{padding:50px 0}
  .section-head{grid-template-columns:1fr;gap:18px;margin-bottom:28px}
  .tools-grid{grid-template-columns:1fr 1fr}.free-grid{grid-template-columns:1fr 1fr}
  .steps-wide{grid-template-columns:1fr 1fr}.prompts-grid{grid-template-columns:1fr}
  .deps-grid{grid-template-columns:1fr}.it-teaser{grid-template-columns:1fr;padding:36px;gap:30px}
  .privacy{grid-template-columns:auto 1fr;padding:24px;gap:16px}.privacy-tag{grid-column:2;justify-self:start}
  .it-mod-head{grid-template-columns:auto 1fr;gap:16px}.it-mod-meta{grid-column:1/-1}
  .it-lessons{grid-template-columns:1fr}.area-page{padding:20px 20px 60px}
  .it-page-hero-inner{padding:40px 20px}.it-modules{padding:40px 20px 60px}.nav{flex-wrap:wrap}
}

function App() {

  const openArea = useCallback((key) => { setAreaKey(key); setPage('area'); }, []);

  return (
    <div className="app">
      <Topbar page={page} setPage={setPage} areaKey={areaKey} openArea={openArea} />

      {page === 'infotools' && <InfotoolsPage />}

function Topbar({ page, setPage }) {
  const scrollTo = (id) => {
    if (page !== 'home') { setPage('home'); setTimeout(() => document.getElementById(id)?.scrollIntoView({behavior:'smooth'}), 120); }

  };
  return (
    <header className="topbar">
      <div className="brand" onClick={() => setPage('home')}>
        <div className="brand-mono">P</div>
        <div>
          <div className="brand-name">PomocaGPT</div>
          <div className="brand-sub">Guía interna · IA</div>
        </div>
      </div>
      <nav className="nav">
        <button className={page==='home'?'active':''} onClick={()=>setPage('home')}>Inicio</button>
        <button onClick={()=>scrollTo('sec-herramientas')}>Herramientas</button>
        <button onClick={()=>scrollTo('sec-prompt')}>Cómo pedir</button>
        <button onClick={()=>scrollTo('sec-deps')}>Por área</button>
        <button className={page==='infotools'?'active':''} onClick={()=>setPage('infotools')}>Infotools E-Learning</button>
      </nav>
      <div className="topbar-right">
        <div className="status-pill"><span className="status-dot"/>En línea</div>
      </div>
    </header>
  );
}

function PrivacyCard() {

    <div className="privacy">

        </div>
      </div>
      <div className="privacy-tag">Regla n°1</div>

function PromptCard({ titulo, txt, index }) {
  const [copied, setCopied] = useState(false);
  const [toast, setToast] = useState(false);
  const copy = () => {
    navigator.clipboard?.writeText(txt);
    setCopied(true); setToast(true);
    setTimeout(()=>setCopied(false), 1800);
    setTimeout(()=>setToast(false), 1800);
  };
  return (
    <>
      <div className="prompt-card">
        <div className="prompt-card-head">
          <h3 className="prompt-title">{titulo}</h3>
          <span className="prompt-code">PG-{String(index).padStart(2,'0')}</span>
        </div>
        <div className="prompt-body">{txt}</div>
        <div className="prompt-actions">
          <button className={`btn-copy${copied?' copied':''}`} onClick={copy}>
            {copied ? '✓ Copiado' : 'Copiar prompt'}
          </button>
        </div>
      </div>
      {toast && <div className="toast">Prompt copiado</div>}
    </>
  );
}

function AreaPage({ areaKey, setPage }) {
  const area = AREAS.find(a=>a.key===areaKey);
  if (!area) return null;
  return (
    <div className="area-page">

        <div className="area-title-big">{area.nombre}</div>

        {area.prompts.map((p,i)=><AreaPromptCard key={i} prompt={p} index={i+1} total={area.prompts.length} />)}
      </div>
    </div>
  );
}

    navigator.clipboard?.writeText(prompt.txt);
    setCopied(true); setToast(true);
    setTimeout(()=>setCopied(false), 1800);
    setTimeout(()=>setToast(false), 1800);
  };
  return (
    <>
      <div className="ap-card">
        <div className="ap-top">
          <div className="ap-meta">
            <div className="ap-num">Prompt {index} de {total}</div>
            <div className="ap-title">{prompt.t}</div>
            <div className="ap-desc">{prompt.d}</div>
          </div>
          <button className={`btn-copy${copied?' copied':''}`} onClick={copy} style={{flexShrink:0}}>
            {copied ? '✓ Copiado' : 'Copiar'}

        </div>
        <div className="ap-box">{prompt.txt}</div>
      </div>
      {toast && <div className="toast">Prompt copiado</div>}
    </>
  );
}
